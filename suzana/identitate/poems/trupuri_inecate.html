<h2 class="identitate">Trupuri înecate în timp</h2>

<div class="poemText">
Mai contemporan 
ca niciodată 
spectacolul morții sfâșie
într-o coridă însângerată
cortina de catifea.

Roșii desfășurări șerpuitoare
aruncate în neant ,
apocalipsa trupurilor 
înecate în ani pe o navă 
răsturnată de timp 
strigă spre cer :
„nu ne uitați”!
