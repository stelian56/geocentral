<h2 class="identitate">Am devenit insulă</h2>

<div class="poemText">
Ape au inundat către mine
pietrificată
am devenit insulă.
Mă îndeletnicesc
cu împletitul razelor
sub formă de cunună
pentru a încorona zeii
cerşetorii, poeţii...
