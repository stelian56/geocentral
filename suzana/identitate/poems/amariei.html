<h2 class="identitate">Amariei</h2>

<div class="poemText">
Am mânat turma de miei
către Bahna cea Mare
în timp ce învăţătoarea
duminica
îmi striga numele: "Amariei",
dăruindu-mi
Premiul întâi.
