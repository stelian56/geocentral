<h2 class="identitate">Mielul cel alb</h2>

<div class="poemText">
Când aţi mâncat tustrei
mielul cel alb
n-a fost un vis
tu îmi spuneai iubitule
că blândul animal
aleargă cu o stea în frunte.
Un vis furat
măcar că era vis
nici visul ce-am visat
n-a fost un vis
un miel cu stea
între stăpâni
ucis de pofte de păgâni.
