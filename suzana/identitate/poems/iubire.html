<h2 class="identitate">Iubire atemporală</h2>

<div class="poemText">
Ai aripi de plumb
uşoare, imateriale.
Mă oboseşte plăcut
iubirea ta
nedefinită, atemporală
atât de presupusă 
şi necesară.
Mă amăgesc cu înserarea
cu norii prea-cereşti
în această toamnă de vară.
Mi-e dor de neatingerea ta
de timpul tău
de urma ta...
