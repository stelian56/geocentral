<h2 class="identitate">Flacăra albă</h2>

<div class="poemText">
Cântecul îngerilor
obrazul,
figura sub văl
petrece tandru
mişcarea ochiului
arzând.
Flacăra albă
creşte voalatic
în aripa de înger
ce naşte din ceruri
pământuri aprinse.
