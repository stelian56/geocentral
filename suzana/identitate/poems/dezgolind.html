<h2 class="identitate">Dezgolind trupul de vise </h2>

<div class="poemText">
Artistul 
la braț cu timpul,
pe aleea de bronz 
topit în statui,  
rătăcitor caută 
calea luminii 
dezgolind  trupul de vise 
calcă orbește 
peste speranța fragilă 
strivită ca o floare
sub călcâi, sângerând
doare...
