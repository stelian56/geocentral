<h2 class="identitate">Muguri de apă</h2>

<div class="poemText">
Sunt cerşetor-plantă
la marea cea moartă.
Din umeri cresc
acvatice plante
muguri de apă
pământ amar
mâna ca melcul
găoace.
Tălpile
rădăcini de calvar.
