<h2 class="identitate">Haita</h2>

<div class="poemText">
În timp civilizat
lupii, viaţa mi-au însângerat
cu urletul lor
mi-au tulburat adormirea
visarea.
M-au hărţuit
cu privirea neomenească
m-au rănit
lupii
haita...
