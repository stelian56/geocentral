<h2 class="identitate">Somnul ca veghe</h2>

<div class="poemText">
Stropi îngemănaţi,
ploi oculare
cresc în puterea albastrului
tulburat de întunericul nopţii.
Trecută fie în a somnului visare
blânda mâhnire
arcuită în viu curcubeu.
