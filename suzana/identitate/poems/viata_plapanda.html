<h2 class="identitate">Viaţă plăpândă</h2>

<div class="poemText">
Nepăsătoarea nepăsare te cuvântă
Plopul cel drept neînfrânt te alină
Umbra ta îmi leagănă sensul
Dorul meu îţi simplifică mersul
Spinul de şes se împlântă adânc
Pasul îmi este tot mai nătâng...
</div>
