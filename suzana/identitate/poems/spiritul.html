<h2 class="identitate">Spiritul luminii &dagger;</h2>

<div class="poemText">
Luna printre crengi apare
şi mă doare scânteierea-i
surd vuieşte apa vieţii
n-am răgaz să te aştept
până cazi în apa clară
faţa să mi-o luminezi...
