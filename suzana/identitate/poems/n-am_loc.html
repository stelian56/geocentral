<h2 class="identitate">N-am loc în lume</h2>

<div class="poemText">
N-am loc în lume
N-am loc a apune
Un hău mă desparte
de voi şi de toate

Iertată să-mi fie
a mea rătăcire
prin univers
printre nori.
Ochii mei
sunt o flacără albă
prin întuneric
până la voi...
