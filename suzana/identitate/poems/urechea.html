<h2 class="identitate">Urechea lui Neptun</h2>

<div class="poemText">
Aud
vuietul lumii
plânsetul.
Mă-nfăşor în zbor.
Mă vindec cu cer.

Ale mele sunt toate
nopţile lungi
ziua ce nu mai apare
viscolul aspru
biciul vremii
frigul
iarna de gheaţă
încremenirea
norii şi umbra
dorul fragil
sfârşitul.
Ale mele sunt toate.....
