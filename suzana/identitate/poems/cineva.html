<h2 class="identitate">Cineva</h2>

<div class="poemText">
A făgăduit să adune
toate stelele de pe cer
dăruindu-mi-le.
Mă-ngrijoram...
N-aveam loc pentru ele
(locuiesc într-o singură cameră
singură)
premeditam o moarte provocată
de invazia aştrilor.
Mă fericeam luminundu-mă
muream...
