<h2 class="identitate">Iluzia ca adevăr</h2>

<div class="poemText">
Veghea destinului naşte
amarul clipei.
Dură.
Tu eşti un contur de noapte
ritmică durere a lunii
răsfrântă în oglinzi ovale.
Tu eşti născător de iluzii.
De stele stinse eşti
născător de iluzii.
