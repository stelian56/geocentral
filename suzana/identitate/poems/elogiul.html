<h2 class="identitate">Elogiul melancoliei</h2>

<div class="poemText">
O, câtă tăcere grăitoare
îşi asumă
pulberea unei seri
trecătoare...
Prelungesc şiroind
gândurile bolnave
de prea multă dorinţă
spre un loc
ce nu l-am cunoscut
niciodată
nicăieri...
