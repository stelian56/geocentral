<h2 class="identitate">Nebuneşte</h2>

<div class="poemText">
Dimineaţă între-zărită.
Alergam
nebuneşte.
Stelele mă prindeau.
Un cântec macedonean
răsfira drumul.
Alergam nebuneşte
nu ştiu unde anume...
Câinii risipeau gunoaiele
speriind zorile
ce se chinuiau să răsară.
