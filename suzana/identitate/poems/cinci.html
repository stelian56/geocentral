<h2 class="identitate">Cinci spre zece</h2>

<div class="poemText">
Umeri rotunjiţi de poveri
modelaţi de vânt
obazul ars
tomna pretimpurie
î-mi alină într-un fel special
ziua de naştere.
Cinci spre zece
seara
când vin plecările de vise
toamna-şi macină rugina
şi ca toamna sunt şi eu...
