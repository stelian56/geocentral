<h2 class="identitate">Cenuşa</h2>

<div class="poemText">
Invizibil
strălucitor
fumegă focul
linişte perfectă
reverie-extaz
inima ca focul pură
rostogolită-n paradis
obscură căldura
apa, cenuşa
sângerează
pământul umed de lacrimi
curge...
