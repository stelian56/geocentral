<h2 class="identitate">Mistuirea</h2>

<div class="poemText">
Nici oceanul
şi nici marea
nu înfruntă jarul
ce-a căzut din soare.
Greaua mea povară
ca un rug fierbinte
când şi unde se va stinge?
Mistuirea
pustiita mare
luna albă
şi sub toate căzătoare
pasărea e numai scrum.
