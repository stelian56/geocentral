<h2 class="identitate">Mi-e umbra deasă de lumină &dagger;</h2>

<div class="poemText">
Mi-e umbra deasă de lumină 
și mă ating de albul ei 
împleticindu-mă în raze 
vorbesc tăcută despre zei.
