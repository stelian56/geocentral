<h2 class="identitate">Vreau să mor ca să mă re-nasc</h2>

<div class="poemText">
A doua zi e ca ieri
ieri este ca astăzi
astăzi ca niciodată
a doua zi vreau sa mor
ca să mă re-nasc
mâine de cu zori.
