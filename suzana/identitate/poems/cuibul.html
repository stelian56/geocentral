<h2 class="identitate">Cuibul prigoriei împlântat în memorie</h2>

<div class="poemText">
Cineva mi-a furat anii 
ascunși în cuibul prigoriei 
împlântat în memorie. 
Cuibul cu ani frumoși 
închide tăcerea adâncă 
misterul, 
lumina neclară 
adormirea lângă mal 
umed surâzând, trezirea 
prigoria cântând 
peste ape. 
</div>
