<h2 class="identitate">Te cunosc ca în palmă </h2>

<div class="poemText">
Mi-ai spus părelnic: 
„te cunosc ca în palmă” 
nu mă vedeai 
traversai greu 
peste firavele 
țesături de amintiri 
filigranate 
încurcându-te în fire, 
în timp, cădeai 
în umbra mea 
adormeai.
