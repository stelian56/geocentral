<h2 class="identitate">Trebuia să fie</h2>

<div class="poemText">
Tatăl m-a vizitat
dincoace de lume.
Nu eram.
Era foarte departe...
Trebuia să-mi închipui
deşertul, nemurirea.
Trebuia să-mi închipui
urma, întunericul
rana
viaţa ce a fugit de el.
Trebuia să-mi închipui
tatăl...
(Trebuia să fie)
</div>
