<h2 class="identitate">Cad peste vânt</h2>

<div class="poemText">
Albastră urmă
vegheată de-amurg...
Mă-mpiedic de stele
prea-des căzătoare
de ierburi umbrite
de prea-mult apus
Cad uneori peste vânt
peste ceaţă...
Dealu-i prea deal
valea-i prea vale
adâncă
umerii mei povara
cu greu o ridică
</div>
