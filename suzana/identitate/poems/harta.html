<h2 class="identitate">Hartă părintească</h2>

<div class="poemText">
Foto-grafie veche
margini roase de trecut
(ca un ţărm muşcat de valuri).

Insulă arsă
hartă părintească
petec de răstimp
urmă aleasă
comoară sfântă
pe un zid închis de viaţă...
