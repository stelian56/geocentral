<h2 class="identitate">Ritual de înmormântare</h2>

<div class="poemText">
M-am învelit cu un vis
de noapte catifelat.
Fără să vreau
fereastra singură s-a deschis.
Am auzit un strigăt prelung
vuiet de ape, ciudat.
Eu discutam incontinuu
cu tatăl meu
explicându-i
ritualul de înmormântare.
El prea bine ştia
cum a fost plecarea
definitivă din lume...
