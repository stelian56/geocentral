<h2 class="identitate">Fragil calendar</h2>

<div class="poemText">
Tristă să-ţi fie
a ta zâmbire
orbirea mă doare
în strat umbrit
bolnavă de sete
şi de lumină
adorm obosită
în asfinţit...
