<h2 class="identitate">Tristeţe universală</h2>

<div class="poemText">
O lume mare
noaptea
cu ochii aţintiţi
la cerul veşniciei oarbe
tristeţe universală
iluzii amare
a lumii searbădă figură
răsfrântă în oglinzi bizare...
