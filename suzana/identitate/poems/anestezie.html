<h2 class="identitate">Anestezie</h2>

<div class="poemText">
Mi-e sufletul greu
dar frumos
ca o piatră de Murano.
Pasărea nevăzutului
mi-a strivit coroana
miresmată
fruntea mi-a surâs
brăzdată.
