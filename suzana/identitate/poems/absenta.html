<h2 class="identitate">Absenţa albastră</h2>

<div class="poemText">
Mi-e dor de apa zăpezii
mi-e sete de tine,
o pasăre
un vultur eşti
absenţa albastră
a nopţilor mele
un contur de iluzii
de stele tu eşti...
