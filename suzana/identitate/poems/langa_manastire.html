<h2 class="identitate">Lângă mănăstire</h2>

<div class="poemText">
Timpul curge ca o apă 
desenând o hartă divină 
în formă de sfânt. 
Marele necunoscut 
așteaptă pe mal 
rugăciunea 
de mâine 
a-plecat.
