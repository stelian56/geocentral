<h2 class="identitate">Durată impură</h2>

<div class="poemText">
Spirala durerii
îmi topeşte lent speranţele.
Navigând
rămân un contur nesigur
de peisaj marin.
(Orizontală impură
rănită de nava singurătăţii perfecte.)
