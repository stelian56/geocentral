<h2 class="identitate">Târziu, am descoperit somnul</h2>

<div class="poemText">
Târziu, am descoperit somnul
somnul cu faţa in sus
mai la nord
somnul cu faţa in jos
mai la sud
somnul cu faţa la perete
mai spre vest
somnul cu faţa spre fereastră
mai spre est
somnul cu faţa la viaţă
mai spre moarte
somnul
Târziu, am descoperit somnul.
</div>
