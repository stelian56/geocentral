<h2 class="identitate">Somnul de fier</h2>

<div class="poemText">
Noaptea-şi lasă
peceţile-n somn
somnul de fier
zodia seacă
marea cu liniştea ei
mă îneacă.
Şarpele blând
iar se-ntrupează
ca-ntr-o pustie
nici unde nu-i oază.
</div>
