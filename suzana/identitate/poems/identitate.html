<h2 class="identitate">Identitate precară</h2>

<div class="poemText">
Ce sunt?
Mielul cel alb.
Amariei.
Ziua de naştere.
Tăcerea grăitoare.
Iedera.
Un loc necunoscut.
O noapte mare...
