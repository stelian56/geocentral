<h2 class="identitate">Regina nopţii</h2>

<div class="poemText">
Luciri de ape vălurite
sparg cristalul de foc
al zilei de vară
poticnită de cadmiu apus...
O spirală
e privirea mea toată
rotindu-se
odată cu pământul
spre valea năpădită
de regina nopţii
sălbatică şi blândă orbire
de alb purificator
seara...
