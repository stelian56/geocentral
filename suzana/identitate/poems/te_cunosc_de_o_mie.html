<h2 class="identitate">Te cunosc de o mie de ani</h2>

<div class="poemText">
Te cunosc de o mie de ani
de o clipă
nu ştiu cine eşti
te-am întâlnit în prima iarnă
priveai o pictură pe cer
surâdeai
întrebai îngerii
când vor să coboare
întrebai cine sunt
indecis
surâdeai...
</div>
