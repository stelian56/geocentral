<h2 class="identitate">Timp deformat</h2>

<div class="poemText">
Neomenească făptură
veghează poarta de fier
teama
adulmecarea numelui meu
schimonosit
sfâşiat de boturi amare
timp deformat
povară
nume fără nume
lătrat de boturi amare.
