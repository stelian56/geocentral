<h2 class="identitate">Mărturisire</h2>

<div class="poemText">
Când voi avea 
experiența muririi,
când voi fi
încolăcită de timp
ca Laocoon
când voi fi vie
și moartă totodată,
vă voi spune 
cât v-am iubit!
