<h2 class="identitate">Surâsul tristei Veneţii</h2>

<div class="poemText">
Nu-ţi cunosc chipul
L-am pierdut
S-a deformat.
Te-am căutat
cu ploaie de priviri
cu viaţa în mâini
cu surâsul tristei Veneţii
în inima oceanului.
Nu erai...
