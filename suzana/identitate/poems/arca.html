<h2 class="identitate">Arca</h2>

<div class="poemText">
Vântul roşiatic
ondulează viaţa
ca o frunză.
Arca
pluteşte nesigur
navigând în plânsetul lumii.
Umerii se năruie
ca malurile
albia
ochiul.
Lacrima lumii
curată se sparge.
