<h2 class="identitate">Agonie de primăvară</h2>

<div class="poemText">
Plouă des
cu stele
cu jar
flori umede
lacrimi de vreme
drumuri deschise
privire ceţoasă
vorbe tăcute.
Mă despoaie un râu
mă inundă un val
un val colorat.
Mă bolteşte curcubeul
înmuguresc degetele
părul înfrunzeşte
cântă respiraţia
lângă suflet
viaţa...
