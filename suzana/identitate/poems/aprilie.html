<h2 class="identitate">Aprilie ucis</h2>

<div class="poemText">
Crescut
în calendarul anului
ca un vlăstar
aprilie ucis
tânăr, frumos.
Fatală-otrăvitoare săgeata
monstrului nevăzut...
Cade coroana solară.
Clipa.
Întreg anotimpul prăbuşit.
Vremea pietrificată
lângă trupul desfrunzit.
E greu fără primăvară,
e greu fără tine...
