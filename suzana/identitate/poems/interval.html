<h2 class="identitate">Interval între Dumnezeu şi om</h2>

<div class="poemText">
Aveam un suflet
dar nu aveam corp
aveam un corp
dar nu aveam suflet
aveam suflet şi
aveam un corp
departe de el
era un interval
între Dumnezeu şi om
