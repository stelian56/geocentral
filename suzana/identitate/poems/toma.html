<h2 class="identitate">Toma</h2>

<div class="poemText">
Te-ai trezit bătut de soare
sorbind seva florilor.
Erai năpădit
de zdrenţele nopţii
tulburate.
Eu
ca niciodată
plecătoare ţi-am şoptit
înneguratule
ai ucis floarea soarelui
cu respiraţia ta amară...
