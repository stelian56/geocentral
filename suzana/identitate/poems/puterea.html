<h2 class="identitate">Puterea vidului</h2>

<div class="poemText">
Ochiul ca noaptea
apune...
Luminaţi-mi calea
rătăcită
am uitat cărarea
mi-am pierdut urma
în neveşnicie.
Nume fără nume
aruncat în colţ de lume...
