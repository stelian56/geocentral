<h2 class="identitate">Naştere</h2>

<div class="poemText">
Dimineaţa
mugurii castanilor
se luptau cu ceaţa
pentru lumină.
Biruitoare, petalele
răsăreau în direcţia
punctelor cardinale
lăsând în urmă o zbatere
în locul naşterii lor
spre lumină.
