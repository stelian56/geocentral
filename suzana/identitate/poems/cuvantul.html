<h2 class="identitate">Cuvântul cel mare</h2>

<div class="poemText">
Lumină astrală
ocrotitoare
dincolo de zare
vin spre rugul serii
să-mi topesc armura
doare
scânteiază
cuvântul cel mare
Sfinxul
sortit să moară
</div>
