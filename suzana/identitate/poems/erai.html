<h2 class="identitate">Erai ceea ce sunt</h2>

<div class="poemText">
Erai ceea ce căutam.
Erai ceea ce sunt.
Erai frumos
risipit în a lumii culoare.
Pianul, harfa
lumina şi apa.
Erai ceea ce sunt.
</div>
