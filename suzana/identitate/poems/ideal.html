<h2 class="identitate">Ideal</h2>

<div class="poemText">
Repar destine
aflate-n vid...
Lucidă lunecare
virtutea
curajul hazardării
căutând himere-ntr-un
monumental nimic
O lume plină de fantome
muribunzi,
artişti visători
vorbind despre tăcere...
