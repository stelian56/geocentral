<h2 class="identitate">Timp răstignit</h2>

<div class="poemText">
M-am reîntors după o viaţă
acasă
am captivat.
Grădina pietrificată
timpul, vremea
a îngheţat definitiv.
Pereţii s-au curbat
iau forma pământului.
Zilele răstignite în ferestre
plăpânde nopţi zidite
mă nasc încă o dată
greşeală fatală.
Începutul...
