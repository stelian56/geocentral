<h2 class="identitate">Anonim</h2>

<div class="poemText">
Nu fii trist, Anonim...
Grădina
locul cel de sus
cu surâsul Monei-Lisa
sclipitor.
Ţi-au rămas culorile
urmele.
Cactuşii au înflorit sângerii
lângă tine
oferindu-ţi rana
pustiul, stepa.
Nu fii trist, Anonim
frumos
te confunzi
ca o boare
cu apă...
