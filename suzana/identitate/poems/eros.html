<h2 class="identitate">Eros neîmpăcat</h2>

<div class="poemText">
Fragil-puternic.
Eros neîmpăcat
cu soarta lumii.
Iubeşti neliniştea
vitală, fierbinte
acum.
Când timpul creşte
o plantă-n trup,
spre ochiul tău închis
în tainică
adâncă nemurire:
- Ce vrajă m-a cuprins
în văzul zilei,
când mâna ta
în aer modelează
a cumpenelor straturi
de lumină?
