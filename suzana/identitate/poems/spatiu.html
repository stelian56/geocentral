<h2 class="identitate">Spaţiu selenar</h2>

<div class="poemText">
Multe crengi răsar sub lună
veşnicind duioasa noapte
freamătul născut de vânturi
mă îngână şi mă surpă
dar urcând în clar de lună
mă-ntrevăd printre luceferi
căutând a rătăcire
Feţi-Frumoşi şi Cosânzene...
