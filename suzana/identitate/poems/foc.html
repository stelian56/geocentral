<h2 class="identitate">Foc ascuns</h2>

<div class="poemText">
A contempla visând
înseamnă a cunoaşte lumea
în plantă, o scânteie
focul
vârful de lance
flacăra albastră,
secretă energie de lumină
în profunzimile obscure...
