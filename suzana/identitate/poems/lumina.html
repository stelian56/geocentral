<h2 class="identitate">Lumina secretă</h2>

<div class="poemText">
Lumina se joacă
şi râde.
Reverie nocturnă
apa
pământul
cerul totodată
visare pretutindeni.
Poetic spaţiul
se înclină
spre univers imaginar
secret impuls originar.
