<h2 class="identitate">Umbra nemărginirii</h2>

<div class="poemText">
Strada fără nume
agonind într-un apus de lume
paşi demonici mă-nspină
lung este drumul
până la tine
eliptic contur
nemărginire.
Mă-ngână timpul
mă frânge predestinul
mă umileşte tinereţea
mă doare infinitul...
